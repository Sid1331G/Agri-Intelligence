services:
  # Backend Service
  - type: web
    name: agri-backend
    runtime: docker
    dockerContext: ./server_backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: ALLOWED_ORIGINS
        fromService:
          name: agri-frontend
          type: web
          property: url

  # Frontend Service
  - type: web
    name: agri-frontend
    runtime: docker
    dockerContext: ./client_frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: agri-backend
          type: web
          property: url