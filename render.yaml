services:
  # Backend Service
  - type: web
    name: agri-backend
    runtime: docker
    dockerContext: ./server_backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: ALLOWED_ORIGINS
        value: "https://agri-frontend.onrender.com"

  # Frontend Service
  - type: web
    name: agri-frontend
    runtime: docker
    dockerContext: ./client_frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://agri-backend.onrender.com"